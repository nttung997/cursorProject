<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebSquare Demo Preview (no engine)</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Segoe UI", system-ui, sans-serif; background: #f4f6f9; color: #1a1a2e; padding: 24px; }
    h1 { font-size: 1.25rem; margin-bottom: 8px; }
    .status { color: #555; margin-bottom: 16px; font-size: 0.9rem; }
    button { padding: 8px 16px; border: 1px solid #3b5bdb; background: #4c6ef5; color: #fff; border-radius: 6px; cursor: pointer; margin-bottom: 16px; }
    button:hover { background: #3b5bdb; }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    th, td { padding: 10px 14px; text-align: left; border-bottom: 1px solid #e9ecef; }
    th { background: #edf2ff; font-weight: 600; font-size: 0.85rem; }
    tr:last-child td { border-bottom: none; }
    .note { margin-top: 20px; padding: 12px 16px; background: #fff3bf; border-radius: 6px; font-size: 0.85rem; line-height: 1.5; }
    code { background: #e9ecef; padding: 1px 5px; border-radius: 3px; font-size: 0.85em; }
  </style>
</head>
<body>
  <h1>WebSquare Demo — Employee List</h1>
  <p class="status" id="status">Loading...</p>
  <button type="button" id="btnRefresh">Refresh</button>
  <table>
    <thead>
      <tr><th>ID</th><th>Name</th><th>Department</th><th>Email</th></tr>
    </thead>
    <tbody id="gridBody"></tbody>
  </table>
  <p class="note">
    This preview mimics <code>WebContent/ui/main.xml</code> without the WebSquare engine.
    Start the Spring Boot app (<code>./gradlew bootRun</code>) so <code>/api/employees</code> is available,
    or open this file after placing <code>employees.json</code> on a local server.
  </p>
  <script>
    const statusEl = document.getElementById("status");
    const gridBody = document.getElementById("gridBody");
    const API = "http://localhost:8080/api/employees";
    const FALLBACK = "../WebContent/data/employees.json";

    async function loadEmployees() {
      statusEl.textContent = "Loading...";
      try {
        let res = await fetch(API);
        if (!res.ok) throw new Error("API unavailable");
        const data = await res.json();
        render(data);
        statusEl.textContent = `Loaded ${data.length} employees from server (scwin.onpageload → submission).`;
      } catch {
        const res = await fetch(FALLBACK);
        const data = await res.json();
        render(data);
        statusEl.textContent = `Loaded ${data.length} employees from local JSON (start bootRun for live API).`;
      }
    }

    function render(rows) {
      gridBody.innerHTML = rows.map(r => `
        <tr>
          <td>${r.id}</td><td>${r.name}</td><td>${r.department}</td><td>${r.email}</td>
        </tr>`).join("");
    }

    document.getElementById("btnRefresh").addEventListener("click", loadEmployees);
    loadEmployees();
  </script>
</body>
</html>
