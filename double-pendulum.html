<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Double Pendulum Simulation</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at 50% 0%, #1a1a2e 0%, #0f0f1a 60%, #050508 100%);
      font-family: "Segoe UI", system-ui, sans-serif;
      color: #e0e0e8;
      overflow: hidden;
    }
    h1 {
      font-size: 1.4rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 0.75rem;
      color: #8899bb;
    }
    canvas {
      display: block;
      border-radius: 8px;
      box-shadow: 0 0 60px rgba(80, 120, 255, 0.08), 0 4px 24px rgba(0,0,0,0.5);
      cursor: crosshair;
    }
    .controls {
      margin-top: 1rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem 1.2rem;
      align-items: center;
      justify-content: center;
      max-width: 720px;
      padding: 0 1rem;
    }
    label {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.82rem;
      color: #8899aa;
    }
    input[type="range"] { width: 90px; accent-color: #6688ff; }
    button {
      background: rgba(100, 130, 255, 0.15);
      border: 1px solid rgba(100, 130, 255, 0.35);
      color: #aac0ff;
      padding: 0.35rem 0.9rem;
      border-radius: 4px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: rgba(100, 130, 255, 0.28); }
    .hint {
      margin-top: 0.6rem;
      font-size: 0.75rem;
      color: #556677;
    }
  </style>
</head>
<body>
  <h1>Double Pendulum</h1>
  <canvas id="canvas"></canvas>
  <div class="controls">
    <label>Gravity <input type="range" id="gravity" min="1" max="30" value="9.81" step="0.1"><span id="gravityVal">9.81</span></label>
    <label>Trail <input type="range" id="trail" min="0" max="800" value="400" step="10"><span id="trailVal">400</span></label>
    <label>Damping <input type="range" id="damping" min="0" max="0.05" value="0" step="0.001"><span id="dampingVal">0</span></label>
    <button id="reset">Reset</button>
    <button id="random">Random start</button>
  </div>
  <p class="hint">Click or drag on canvas to set initial angles</p>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    const SIZE = 640;
    canvas.width = SIZE;
    canvas.height = SIZE;

    const params = {
      m1: 1, m2: 1,
      l1: 160, l2: 160,
      g: 9.81,
      damping: 0
    };

    let state = { theta1: Math.PI / 2, theta2: Math.PI / 2, omega1: 0, omega2: 0 };
    let trail = [];
    let maxTrail = 400;
    let dragging = false;

    const pivot = { x: SIZE / 2, y: SIZE / 2 - 40 };

    function derivatives(s) {
      const { theta1: t1, theta2: t2, omega1: w1, omega2: w2 } = s;
      const { m1, m2, l1, l2, g, damping } = params;
      const d = t1 - t2;
      const sinD = Math.sin(d);
      const cosD = Math.cos(d);

      const num1 = -g * (2 * m1 + m2) * Math.sin(t1)
        - m2 * g * Math.sin(t1 - 2 * t2)
        - 2 * sinD * m2 * (w2 * w2 * l2 + w1 * w1 * l1 * cosD);
      const den1 = l1 * (2 * m1 + m2 - m2 * Math.cos(2 * d));

      const num2 = 2 * sinD * (
        w1 * w1 * l1 * (m1 + m2)
        + g * (m1 + m2) * Math.cos(t1)
        + w2 * w2 * l2 * m2 * cosD
      );
      const den2 = l2 * (2 * m1 + m2 - m2 * Math.cos(2 * d));

      let alpha1 = num1 / den1;
      let alpha2 = num2 / den2;

      alpha1 -= damping * w1;
      alpha2 -= damping * w2;

      return { dtheta1: w1, dtheta2: w2, domega1: alpha1, domega2: alpha2 };
    }

    function advance(s, k, dt) {
      return {
        theta1: s.theta1 + k.dtheta1 * dt,
        theta2: s.theta2 + k.dtheta2 * dt,
        omega1: s.omega1 + k.domega1 * dt,
        omega2: s.omega2 + k.domega2 * dt
      };
    }

    function rk4Step(s, dt) {
      const k1 = derivatives(s);
      const k2 = derivatives(advance(s, k1, dt / 2));
      const k3 = derivatives(advance(s, k2, dt / 2));
      const k4 = derivatives(advance(s, k3, dt));

      return {
        theta1: s.theta1 + (k1.dtheta1 + 2 * k2.dtheta1 + 2 * k3.dtheta1 + k4.dtheta1) * dt / 6,
        theta2: s.theta2 + (k1.dtheta2 + 2 * k2.dtheta2 + 2 * k3.dtheta2 + k4.dtheta2) * dt / 6,
        omega1: s.omega1 + (k1.domega1 + 2 * k2.domega1 + 2 * k3.domega1 + k4.domega1) * dt / 6,
        omega2: s.omega2 + (k1.domega2 + 2 * k2.domega2 + 2 * k3.domega2 + k4.domega2) * dt / 6
      };
    }

    function positions(s) {
      const { l1, l2 } = params;
      const x1 = pivot.x + l1 * Math.sin(s.theta1);
      const y1 = pivot.y + l1 * Math.cos(s.theta1);
      const x2 = x1 + l2 * Math.sin(s.theta2);
      const y2 = y1 + l2 * Math.cos(s.theta2);
      return { x1, y1, x2, y2 };
    }

    function anglesFromPoint(px, py) {
      const theta1 = Math.atan2(px - pivot.x, py - pivot.y);
      const x1 = pivot.x + params.l1 * Math.sin(theta1);
      const y1 = pivot.y + params.l1 * Math.cos(theta1);
      const theta2 = Math.atan2(px - x1, py - y1);
      return { theta1, theta2 };
    }

    function reset(random = false) {
      if (random) {
        state = {
          theta1: Math.random() * Math.PI * 2 - Math.PI,
          theta2: Math.random() * Math.PI * 2 - Math.PI,
          omega1: (Math.random() - 0.5) * 4,
          omega2: (Math.random() - 0.5) * 4
        };
      } else {
        state = { theta1: Math.PI / 2, theta2: Math.PI / 2, omega1: 0, omega2: 0 };
      }
      trail = [];
    }

    function draw() {
      ctx.fillStyle = "rgba(8, 8, 16, 0.35)";
      ctx.fillRect(0, 0, SIZE, SIZE);

      const { x1, y1, x2, y2 } = positions(state);

      if (maxTrail > 0) {
        trail.push({ x: x2, y: y2 });
        if (trail.length > maxTrail) trail.shift();
      }

      if (trail.length > 1) {
        for (let i = 1; i < trail.length; i++) {
          const t = i / trail.length;
          ctx.strokeStyle = `hsla(${220 + t * 60}, 80%, ${45 + t * 25}%, ${t * 0.85})`;
          ctx.lineWidth = 1.2;
          ctx.beginPath();
          ctx.moveTo(trail[i - 1].x, trail[i - 1].y);
          ctx.lineTo(trail[i].x, trail[i].y);
          ctx.stroke();
        }
      }

      ctx.strokeStyle = "rgba(180, 190, 220, 0.5)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(pivot.x, pivot.y);
      ctx.lineTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();

      ctx.fillStyle = "#6688ff";
      ctx.beginPath();
      ctx.arc(pivot.x, pivot.y, 5, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#88aaff";
      ctx.beginPath();
      ctx.arc(x1, y1, 10, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#ff6688";
      ctx.beginPath();
      ctx.arc(x2, y2, 12, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "rgba(255,255,255,0.15)";
      ctx.beginPath();
      ctx.arc(x2, y2, 4, 0, Math.PI * 2);
      ctx.fill();
    }

    let lastTime = performance.now();
    let paused = false;

    function loop(now) {
      const dt = Math.min((now - lastTime) / 1000, 0.032);
      lastTime = now;

      if (!paused && !dragging) {
        const steps = 8;
        const subDt = dt / steps;
        for (let i = 0; i < steps; i++) {
          state = rk4Step(state, subDt);
        }
      }

      draw();
      requestAnimationFrame(loop);
    }

    canvas.addEventListener("mousedown", (e) => {
      const rect = canvas.getBoundingClientRect();
      const px = (e.clientX - rect.left) * (SIZE / rect.width);
      const py = (e.clientY - rect.top) * (SIZE / rect.height);
      const a = anglesFromPoint(px, py);
      state.theta1 = a.theta1;
      state.theta2 = a.theta2;
      state.omega1 = 0;
      state.omega2 = 0;
      trail = [];
      dragging = true;
      paused = true;
    });

    canvas.addEventListener("mousemove", (e) => {
      if (!dragging) return;
      const rect = canvas.getBoundingClientRect();
      const px = (e.clientX - rect.left) * (SIZE / rect.width);
      const py = (e.clientY - rect.top) * (SIZE / rect.height);
      const a = anglesFromPoint(px, py);
      state.theta1 = a.theta1;
      state.theta2 = a.theta2;
    });

    window.addEventListener("mouseup", () => {
      if (dragging) {
        dragging = false;
        paused = false;
      }
    });

    function bindSlider(id, valId, key, fmt = (v) => v) {
      const el = document.getElementById(id);
      const val = document.getElementById(valId);
      el.addEventListener("input", () => {
        const v = parseFloat(el.value);
        if (key === "g") params.g = v;
        else if (key === "damping") params.damping = v;
        else if (key === "trail") maxTrail = v | 0;
        val.textContent = fmt(v);
        if (key === "trail") trail = [];
      });
    }

    bindSlider("gravity", "gravityVal", "g", (v) => v.toFixed(2));
    bindSlider("damping", "dampingVal", "damping", (v) => v.toFixed(3));
    bindSlider("trail", "trailVal", "trail", (v) => v | 0);

    document.getElementById("reset").addEventListener("click", () => reset(false));
    document.getElementById("random").addEventListener("click", () => reset(true));

    ctx.fillStyle = "#080810";
    ctx.fillRect(0, 0, SIZE, SIZE);
    requestAnimationFrame(loop);
  </script>
</body>
</html>
